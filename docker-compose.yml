services:
  postgres:
    image: postgres:17-alpine
    container_name: umkm_os_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: umkm_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d umkm_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

